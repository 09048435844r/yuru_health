version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yuruhealth_app
    restart: unless-stopped
    env_file:
      - dist/.env.production
    volumes:
      - .:/app
      - /sys:/host_sys:ro
      - /proc:/host_proc:ro
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
      PSUTIL_PROCFS_PATH: ${PSUTIL_PROCFS_PATH:-/host_proc}
    ports:
      - "8501:8501"
    command: >
      streamlit run app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.runOnSave=true
      --server.fileWatcherType=poll
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yuruhealth_worker
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    env_file:
      - dist/.env.production
    volumes:
      - .:/app
      - /sys:/host_sys:ro
      - /proc:/host_proc:ro
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
      FETCH_INTERVAL_SECONDS: ${FETCH_INTERVAL_SECONDS:-900}
      SYSTEM_HEALTH_INTERVAL_SECONDS: ${SYSTEM_HEALTH_INTERVAL_SECONDS:-300}
      SYSTEM_HEALTH_RETENTION_DAYS: ${SYSTEM_HEALTH_RETENTION_DAYS:-30}
      SYSTEM_HEALTH_DISK_PATH: ${SYSTEM_HEALTH_DISK_PATH:-/app}
      PSUTIL_PROCFS_PATH: ${PSUTIL_PROCFS_PATH:-/host_proc}
    command: ["/app/scripts/worker_with_health.sh"]

  system_health_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yuruhealth_system_health_worker
    restart: unless-stopped
    volumes:
      - .:/app
      - /sys:/host_sys:ro
      - /proc:/host_proc:ro
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
      PSUTIL_PROCFS_PATH: ${PSUTIL_PROCFS_PATH:-/host_proc}
      SYSTEM_HEALTH_INTERVAL_SECONDS: ${SYSTEM_HEALTH_INTERVAL_SECONDS:-300}
      SYSTEM_HEALTH_RETENTION_DAYS: ${SYSTEM_HEALTH_RETENTION_DAYS:-30}
      SYSTEM_HEALTH_DISK_PATH: ${SYSTEM_HEALTH_DISK_PATH:-/app}
    command: python -m src.system_health_worker
