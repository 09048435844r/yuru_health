version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yuruhealth_app
    restart: unless-stopped
    env_file:
      - dist/.env.production
    volumes:
      - .:/app
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
    ports:
      - "8501:8501"
    command: >
      streamlit run app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.runOnSave=true
      --server.fileWatcherType=poll
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yuruhealth_worker
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    env_file:
      - dist/.env.production
    volumes:
      - .:/app
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
      FETCH_INTERVAL_SECONDS: ${FETCH_INTERVAL_SECONDS:-900}
    command:
      - /bin/sh
      - -ec
      - |
        interval="$${FETCH_INTERVAL_SECONDS:-900}"
        case "$${interval}" in
          ''|*[!0-9]*)
            echo "[worker] invalid FETCH_INTERVAL_SECONDS='$${interval}', fallback to 900"
            interval=900
            ;;
        esac

        while true; do
          echo "[worker] $$(date -Iseconds) start fetch"
          python -m src.main --auto
          rc=$$?
          echo "[worker] $$(date -Iseconds) done rc=$${rc}"
          sleep "$${interval}"
        done
