# YuruHealth 設定ファイル（公開設定のみ — 機密情報は st.secrets で管理）

env: "local"

# Gemini AI モデル設定
gemini:
  model_name: "gemini-3-flash-preview"
  available_models:
    - "gemini-3-flash-preview"
    - "gemini-3-pro-preview"

# Withings 設定（非機密部分のみ）
withings:
  redirect_uri: "http://localhost:8501/callback"

google_fit:
  sleep_parser:
    source_policy: "min" # min / max / oura / shealth / healthsync / prefer:<packageName>
    min_candidate_minutes: 120
    awake_keywords:
      - "awake"
      - "wake"
      - "覚醒"

system_health:
  cache:
    ttl_seconds: 180
  ui:
    temp_warn_c: 60
    temp_critical_c: 70
    usage_warn_percent: 85
    usage_critical_percent: 95
